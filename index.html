<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Mother's Day</title>
    <style>
        :root {
            --primary-pink: #ff4d6d;
            --soft-pink: #ffccd5;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #fff0f3 0%, #ffccd5 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Georgia', serif;
        }

        /* The Greeting Card */
        .greeting-card {
            background: rgba(255, 255, 255, 0.8);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.2);
            text-align: center;
            z-index: 10;
            border: 2px solid white;
            backdrop-filter: blur(5px);
            animation: float 3s ease-in-out infinite;
        }

        h1 {
            color: var(--primary-pink);
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            color: #590d22;
            font-size: 1.2rem;
            font-style: italic;
        }

        /* Floating Animation for Card */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Rose Petal / Flower Style */
        .rose {
            position: absolute;
            top: -50px;
            user-select: none;
            pointer-events: none;
            z-index: 5;
            font-size: 2rem;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg) translateX(0);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg) translateX(50px);
                opacity: 0.3;
            }
        }
    </style>
</head>
<body>

    <div class="greeting-card">
        <h1>Happy Mother's Day</h1>
        <p>To the world's best Mom,<br>Thank you for everything you do!</p>
    </div>

    <script>
        function createRose() {
            const roses = ['🌹', '🌸', '🌷', '💖', '✨'];
            const rose = document.createElement('div');
            rose.classList.add('rose');
            
            // Randomize appearance
            rose.innerText = roses[Math.floor(Math.random() * roses.length)];
            rose.style.left = Math.random() * 100 + "vw";
            
            // Randomize size and speed
            const duration = Math.random() * 3 + 4 + "s";
            rose.style.animationDuration = duration;
            rose.style.fontSize = Math.random() * 20 + 20 + "px";
            
            document.body.appendChild(rose);

            // Clean up memory after animation finishes
            setTimeout(() => {
                rose.remove();
            }, 7000);
        }

        // Create a new rose every 300 milliseconds
        setInterval(createRose, 300);
    </script>
</body>
</html>
